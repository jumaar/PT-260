<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impresor Térmico</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <header>
        <h1>Impresor Térmico</h1>
        <div id="conn-panel">
            <!-- Panel unificado USB / Bluetooth -->
            <span id="conn-icon"></span>
            <span id="conn-text">Verificando...</span>
            <button id="bt-scan-btn" class="btn-hdr" style="display:none">Escanear BT</button>
            <span id="bt-spinner" class="spinner" style="display:none"></span>
            <select id="bt-device-list" style="display:none"></select>
            <button id="bt-connect-btn" class="btn-hdr" style="display:none">Conectar</button>
            <button id="bt-disconnect-btn" class="btn-hdr btn-hdr-off" style="display:none">Desconectar</button>
        </div>
    </header>

    <main>
        <div class="canvas-row">
            <div class="height-control">
                <label for="ctrl-height">Alto<br>(mm)</label>
                <div class="stepper">
                    <button class="stepper-btn" data-target="ctrl-height" data-step="-1">−</button>
                    <input type="number" id="ctrl-height" min="10" max="100" value="40">
                    <button class="stepper-btn" data-target="ctrl-height" data-step="1">+</button>
                </div>
            </div>
            <div id="canvas-container" title="Click para escribir">
                <canvas id="sticker-canvas" tabindex="0"></canvas>
                <textarea id="keyboard-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
            </div>
        </div>

        <div class="width-control">
            <label for="ctrl-width">Ancho (mm)</label>
            <div class="stepper">
                <button class="stepper-btn" data-target="ctrl-width" data-step="-1">−</button>
                <input type="number" id="ctrl-width" min="10" max="58" value="58">
                <button class="stepper-btn" data-target="ctrl-width" data-step="1">+</button>
            </div>
        </div>

        <div class="action-row">
            <button id="btn-print" class="btn-primary">Imprimir</button>
            <label class="switch-group">
                <input type="checkbox" id="invert-checkbox">
                <span>Invertir</span>
            </label>
            <button id="btn-clear" class="btn-secondary">Limpiar</button>
        </div>
    </main>

    <footer>
        <div class="footer-control">
            <label for="ctrl-fontsize">Fuente (px)</label>
            <div class="stepper">
                <button class="stepper-btn" data-target="ctrl-fontsize" data-step="-1">−</button>
                <input type="number" id="ctrl-fontsize" min="8" max="72" value="24">
                <button class="stepper-btn" data-target="ctrl-fontsize" data-step="1">+</button>
            </div>
        </div>
        <div class="footer-control">
            <label for="ctrl-copies">Copias</label>
            <div class="stepper">
                <button class="stepper-btn" data-target="ctrl-copies" data-step="-1">−</button>
                <input type="number" id="ctrl-copies" min="1" max="99" value="1">
                <button class="stepper-btn" data-target="ctrl-copies" data-step="1">+</button>
            </div>
        </div>
    </footer>

    <div id="toast-overlay" style="display:none"></div>

    <!-- Debug Console -->
    <div id="debug-console" style="display:none">
        <div id="debug-header">
            <span>DEBUG</span>
            <button id="debug-toggle">_</button>
            <button id="debug-clear">Clear</button>
        </div>
        <div id="debug-log"></div>
    </div>
    <div id="debug-tab">LOG</div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
